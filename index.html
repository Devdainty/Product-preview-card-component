<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <div class="image_container">
      <img src="./images/image-product-mobile.jpg" alt="picture of perfume" class="mobile">
      <img src="./images/image-product-desktop.jpg" alt="picture of perfume" class="desktop">
    </div>
    <section>
      <h1>PERFUME</h1>

      <h2>Gabrielle Essence Eau De Parfum</h2>

      <p class="main_paragraph">
        A floral, solar and voluptuous interpretation composed by Olivier Polge,Perfumer-Creator for the House of CHANEL.
      </p>

      <p class="price_change">
        <span class="main_prize">$149.99</span>
        <span class="slashed_prize"><strike>$169.99</strike></span>
      </p>

      <div class="purchase_link">
        <div><img src="./images/icon-cart.svg" alt=""></div>
        <a href="#">Add to Cart</a>
      </div>
    </section>
    

  </main>

  </div>
</body>
</html>
